on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "Meta**"
      - "data-raw**"
      - "docs**"
      - "inst**"
      - "man**"
      - "memcheck**"
      - "tests**"
      - "vignettes**"
      - "**.git"
      - "**.json"
      - "**.md"
      - "**.yml"
      - "!**revdepcheck.yml"
      - "**.R[dD]ata"
      - "**.Rpro*"
  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - "Meta**"
      - "data-raw**"
      - "docs**"
      - "inst**"
      - "man**"
      - "memcheck**"
      - "tests**"
      - "vignettes**"
      - "**.git"
      - "**.json"
      - "**.md"
      - "**.yml"
      - "!**revdepcheck.yml"
      - "**.R[dD]ata"
      - "**.Rpro*"
  schedule:
    - cron: '30 5 1 * *'
name: revdep-check
jobs:
  revdepcheck:
    runs-on: ubuntu-latest
    name: revdepcheck, Linux, R release
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # Keep this workflow's package cache separate from other workflows
          # (which use the default cache-version)
          cache-version: revdep
          # BiocManager + BiocVersion let revdepcheck/pak resolve the correct
          # Bioconductor version from the installed BiocVersion package, so we
          # no longer hardcode R_BIOC_VERSION. (Running on Linux also avoids the
          # Bioconductor binary-repo errors that occur on Windows/macOS.)
          extra-packages: |
            local::.
            any::BiocManager
            any::BiocVersion
            r-lib/revdepcheck
          needs: check
      - name: Check reverse dependencies
        run: |
          revdepcheck::revdep_reset()
          revdepcheck::revdep_check(num_workers=4)
          problems <- readLines('revdep/problems.md', warn = FALSE)
          if (length(problems) > 1) stop(paste0(problems, collapse= "\n"))
        shell: Rscript {0}
      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: revdep-results
          path: revdep/*.md
